<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProDentalConnect — Tooth Resolver Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0d12;
    --surface: #111620;
    --border: #1e2535;
    --accent: #00c8ff;
    --accent2: #7c5cfc;
    --pass: #00d68f;
    --warn: #ffaa00;
    --fail: #ff4d6a;
    --text: #e2e8f0;
    --muted: #64748b;
    --tooth-hover: rgba(0,200,255,0.18);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  #app { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 52px 1fr; height: 100vh; }

  /* ── Header ── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #header .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase; }
  #header .sep { width: 1px; height: 20px; background: var(--border); }
  #header .tag { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .badge-preview { background: rgba(124,92,252,0.15); color: var(--accent2); border: 1px solid rgba(124,92,252,0.3); }
  #header .spacer { flex: 1; }

  /* Model toggle */
  .toggle-group { display: flex; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .toggle-btn {
    font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500;
    padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer;
    background: transparent; color: var(--muted); transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .toggle-btn.active { background: var(--accent); color: #000; }

  /* ── Canvas area ── */
  #viewport {
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 40% 40%, #0d1829 0%, #080b10 70%);
  }
  canvas { display: block; width: 100% !important; height: 100% !important; }

  /* Loading overlay */
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: var(--bg); z-index: 10; transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-msg { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  #load-pct { font-size: 22px; font-weight: 500; color: var(--accent); font-family: 'DM Mono', monospace; }

  /* Hover tooltip */
  #tooltip {
    position: absolute; pointer-events: none; z-index: 5;
    background: rgba(10,13,18,0.92); border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 12px; font-family: 'DM Mono', monospace;
    font-size: 12px; opacity: 0; transition: opacity 0.12s;
    backdrop-filter: blur(8px);
  }
  #tooltip.show { opacity: 1; }
  #tooltip .palmer { font-size: 16px; font-weight: 500; color: var(--accent); }
  #tooltip .glb-name { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Instructions overlay */
  #instructions {
    position: absolute; bottom: 16px; left: 16px;
    font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace;
    line-height: 1.8; pointer-events: none;
  }

  /* ── Side panel ── */
  #panel {
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .panel-section { border-bottom: 1px solid var(--border); padding: 14px 16px; }
  .panel-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  /* Selected tooth card */
  #selected-card { min-height: 80px; }
  #selected-palmer {
    font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace;
    color: var(--accent); line-height: 1;
  }
  #selected-glb { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; }
  #selected-type { font-size: 12px; color: var(--text); margin-top: 8px; }
  #no-selection { font-size: 12px; color: var(--muted); font-style: italic; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-pill {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
  }
  .stat-pill .val { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--text); }
  .stat-pill .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .stat-pill .val.pass { color: var(--pass); }
  .stat-pill .val.warn { color: var(--warn); }

  /* Mapping console */
  #mapping-list {
    flex: 1; overflow-y: auto; padding: 8px 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .map-row {
    display: flex; align-items: center; gap: 0;
    padding: 3px 16px; cursor: default;
    transition: background 0.1s; font-family: 'DM Mono', monospace; font-size: 11px;
  }
  .map-row:hover { background: rgba(255,255,255,0.03); }
  .map-row.active { background: rgba(0,200,255,0.08); }
  .map-glb { color: var(--muted); width: 100px; flex-shrink: 0; }
  .map-arrow { color: var(--border); margin: 0 6px; flex-shrink: 0; }
  .map-palmer { color: var(--accent); font-weight: 500; flex: 1; }
  .map-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pass); flex-shrink: 0; margin-left: 6px;
  }
  .map-dot.pending { background: var(--border); }

  /* Status bar */
  #statusbar {
    padding: 8px 16px; font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--muted); border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pass); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="logo">ProDentalConnect</span>
    <span class="sep"></span>
    <span class="tag">3D Resolver Preview</span>
    <span class="badge badge-preview">PRE-PUSH</span>
    <div class="spacer"></div>
    <div class="toggle-group">
      <button class="toggle-btn active" id="btn-stained" onclick="switchModel('stained')">Stained</button>
      <button class="toggle-btn" id="btn-nostain" onclick="switchModel('nostain')">No Stain</button>
    </div>
  </header>

  <!-- Viewport -->
  <div id="viewport">
    <canvas id="c"></canvas>
    <div id="loading">
      <div class="spinner"></div>
      <div id="load-pct">0%</div>
      <div id="load-msg">Loading GLB…</div>
    </div>
    <div id="tooltip">
      <div class="palmer" id="tip-palmer"></div>
      <div class="glb-name" id="tip-glb"></div>
    </div>
    <div id="instructions">
      Drag to rotate · Scroll to zoom · Click any tooth
    </div>
  </div>

  <!-- Side panel -->
  <div id="panel">

    <div class="panel-section" id="selected-card">
      <div class="panel-label">Selected tooth</div>
      <div id="no-selection">Click a tooth to inspect</div>
      <div id="selection-detail" style="display:none">
        <div id="selected-palmer"></div>
        <div id="selected-glb"></div>
        <div id="selected-type"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">Model stats</div>
      <div class="stats-grid">
        <div class="stat-pill"><div class="val pass" id="stat-meshes">—</div><div class="lbl">Meshes</div></div>
        <div class="stat-pill"><div class="val pass" id="stat-resolved">—</div><div class="lbl">Resolved</div></div>
        <div class="stat-pill"><div class="val warn" id="stat-tris">153k</div><div class="lbl">Triangles</div></div>
        <div class="stat-pill"><div class="val warn" id="stat-size">~42MB</div><div class="lbl">File size</div></div>
      </div>
    </div>

    <div class="panel-section" style="border-bottom:none; flex:1; display:flex; flex-direction:column; overflow:hidden; padding-bottom:0;">
      <div class="panel-label" style="padding:0 0 0 0; margin-bottom:6px;">GLB → Palmer mapping</div>
      <div id="mapping-list"></div>
    </div>

    <div id="statusbar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Initialising…</span>
    </div>

  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Palmer mapping (from audited mesh positions) ──────────────────────────
const GLB_TO_PALMER = {
  "U1":"UL1","U1_copy1":"UR1","U2":"UL2","U2_copy1":"UR2",
  "U3":"UL3","U3_copy1":"UR3","U4":"UL4","U4_copy1":"UR4",
  "U5":"UL5","U5_copy1":"UR5","U6":"UL6","U6_copy1":"UR6",
  "U7":"UL7","U7_copy1":"UR7","U8":"UR8","U8_copy1":"UL8",
  "L1":"LR1","L1_copy1":"LL1","L2":"LR2","L2_copy1":"LL2",
  "L3":"LL3","L3_copy1":"LR3","L4":"LL4","L4_copy1":"LR4",
  "L5":"LL5","L5_copy1":"LR5","L6":"LR6","L6_copy1":"LL6",
  "L7":"LL7","L7_copy1":"LR7","L8":"LL8","L8_copy1":"LR8",
  "gum_upper":"gums_upper","gum_lower":"gums_lower"
};

const TOOTH_TYPES = {
  1:"Central incisor",2:"Lateral incisor",3:"Canine",
  4:"First premolar",5:"Second premolar",6:"First molar",
  7:"Second molar",8:"Third molar (wisdom)"
};

// ── Scene setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 100);
camera.position.set(0, 2, 8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);

// Lighting
const amb = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(amb);
const dir = new THREE.DirectionalLight(0xfff5f0, 2.5);
dir.position.set(2, 4, 3);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xf0f8ff, 1.0);
dir2.position.set(-3, 2, -2);
scene.add(dir2);
const fill = new THREE.PointLight(0xffffff, 0.8, 30);
fill.position.set(0, -3, 2);
scene.add(fill);

// ── Resize ────────────────────────────────────────────────────────────────
function resize() {
  const vp = document.getElementById('viewport');
  const w = vp.clientWidth, h = vp.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Raycaster ─────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;
let selectedMesh = null;
const origMaterials = new Map();
let allMeshes = [];

function toNDC(e) {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
}

function getMeshHit(e) {
  toNDC(e);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(allMeshes, false);
  if (!hits.length) return null;
  let obj = hits[0].object;
  while (obj && !obj.userData.toothId) obj = obj.parent;
  return obj || null;
}

function setHighlight(mesh, mode) {
  if (!mesh) return;
  if (mode === 'none') {
    if (origMaterials.has(mesh)) {
      mesh.material = origMaterials.get(mesh);
      origMaterials.delete(mesh);
    }
    return;
  }
  if (!origMaterials.has(mesh)) origMaterials.set(mesh, mesh.material);
  const m = mesh.material.clone();
  if (mode === 'hover') { m.emissive = new THREE.Color(0x004466); m.emissiveIntensity = 0.5; }
  if (mode === 'select') { m.emissive = new THREE.Color(0x003388); m.emissiveIntensity = 0.9; }
  mesh.material = m;
}

// Mousemove → hover
canvas.addEventListener('mousemove', e => {
  const hit = getMeshHit(e);
  const tip = document.getElementById('tooltip');
  if (hit && hit !== selectedMesh) {
    if (hit !== hoveredMesh) {
      if (hoveredMesh && hoveredMesh !== selectedMesh) setHighlight(hoveredMesh, 'none');
      hoveredMesh = hit;
      setHighlight(hit, 'hover');
    }
    const pid = hit.userData.toothId;
    document.getElementById('tip-palmer').textContent = pid;
    document.getElementById('tip-glb').textContent = `GLB: ${hit.name}`;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
    tip.classList.add('show');
    highlightMapRow(pid);
  } else {
    if (hoveredMesh && hoveredMesh !== selectedMesh) {
      setHighlight(hoveredMesh, 'none');
      hoveredMesh = null;
    }
    tip.classList.remove('show');
    if (!selectedMesh) highlightMapRow(null);
  }
});

// Click → select
canvas.addEventListener('click', e => {
  const hit = getMeshHit(e);
  if (selectedMesh && selectedMesh !== hit) {
    setHighlight(selectedMesh, hoveredMesh === selectedMesh ? 'hover' : 'none');
  }
  selectedMesh = hit;
  if (hit) {
    setHighlight(hit, 'select');
    showSelection(hit);
    highlightMapRow(hit.userData.toothId, true);
  } else {
    clearSelection();
  }
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').classList.remove('show');
});

function showSelection(mesh) {
  const pid = mesh.userData.toothId;
  const num = parseInt(pid.replace(/[^0-9]/g,''));
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('selection-detail').style.display = 'block';
  document.getElementById('selected-palmer').textContent = pid;
  document.getElementById('selected-glb').textContent = `GLB mesh: ${mesh.name}`;
  document.getElementById('selected-type').textContent = TOOTH_TYPES[num] || 'Gum tissue';
}

function clearSelection() {
  document.getElementById('no-selection').style.display = 'block';
  document.getElementById('selection-detail').style.display = 'none';
  highlightMapRow(null);
}

// ── Mapping list UI ───────────────────────────────────────────────────────
function buildMappingList(entries) {
  const list = document.getElementById('mapping-list');
  list.innerHTML = '';
  entries.forEach(([glb, palmer]) => {
    const row = document.createElement('div');
    row.className = 'map-row pending-row';
    row.dataset.palmer = palmer;
    row.innerHTML = `
      <span class="map-glb">${glb}</span>
      <span class="map-arrow">→</span>
      <span class="map-palmer">${palmer}</span>
      <span class="map-dot pending" data-dot="${palmer}"></span>`;
    row.addEventListener('click', () => selectByPalmer(palmer));
    list.appendChild(row);
  });
}

function resolveMapRow(palmer) {
  const dot = document.querySelector(`[data-dot="${palmer}"]`);
  if (dot) dot.classList.remove('pending');
}

function highlightMapRow(palmer, scroll) {
  document.querySelectorAll('.map-row').forEach(r => r.classList.remove('active'));
  if (!palmer) return;
  const row = document.querySelector(`.map-row[data-palmer="${palmer}"]`);
  if (row) {
    row.classList.add('active');
    if (scroll) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

function selectByPalmer(palmer) {
  const mesh = window._toothMap?.[palmer];
  if (!mesh) return;
  if (selectedMesh) setHighlight(selectedMesh, 'none');
  selectedMesh = mesh;
  setHighlight(mesh, 'select');
  showSelection(mesh);
  highlightMapRow(palmer, true);
}

// ── Resolver (mirrors useToothResolver.js logic) ──────────────────────────
function resolveScene(scene3d) {
  const map = {};
  const box = new THREE.Box3();
  const center = new THREE.Vector3();

  scene3d.traverse(obj => {
    if (!(obj instanceof THREE.Mesh)) return;
    const glbName = obj.name;
    let palmerID = GLB_TO_PALMER[glbName];

    if (!palmerID) {
      obj.geometry.computeBoundingBox();
      box.copy(obj.geometry.boundingBox).applyMatrix4(obj.matrixWorld);
      box.getCenter(center);
      const cx = center.x;
      const match = glbName.match(/^([UL])(\d+)/i);
      if (match) {
        palmerID = `${match[1].toUpperCase()}${cx >= 0 ? 'R' : 'L'}${match[2]}`;
      } else {
        palmerID = `UNKNOWN_${glbName}`;
      }
    }

    obj.userData.toothId = palmerID;
    obj.userData.glbName = glbName;
    if (!palmerID.startsWith('UNKNOWN')) map[palmerID] = obj;

    // Update dot in list
    resolveMapRow(palmerID);
  });

  window._toothMap = map;
  return map;
}

// ── Model loading ─────────────────────────────────────────────────────────
const loader = new GLTFLoader();
let currentGroup = null;

const MODELS = {
  stained: 'Teeth_Stained.glb',
  nostain: 'Teeth_NoStain.glb'
};

const MAPPING_ENTRIES = Object.entries(GLB_TO_PALMER);

async function loadModel(key) {
  const loading = document.getElementById('loading');
  const loadMsg = document.getElementById('load-msg');
  const loadPct = document.getElementById('load-pct');

  loading.classList.remove('hidden');
  loadMsg.textContent = `Loading ${MODELS[key]}…`;
  loadPct.textContent = '0%';

  document.getElementById('status-text').textContent = 'Loading model…';
  document.getElementById('status-dot').style.background = 'var(--warn)';
  document.getElementById('stat-meshes').textContent = '—';
  document.getElementById('stat-resolved').textContent = '—';

  // Reset map list dots
  document.querySelectorAll('.map-dot').forEach(d => d.classList.add('pending'));

  if (currentGroup) { scene.remove(currentGroup); currentGroup = null; }
  allMeshes = [];
  hoveredMesh = null;
  selectedMesh = null;
  origMaterials.clear();
  clearSelection();

  buildMappingList(MAPPING_ENTRIES);

  loader.load(
    MODELS[key],
    (gltf) => {
      const group = new THREE.Group();
      // Scale: GLB is ~35×50×15 units, scale 0.2 → ~7×10×3
      group.scale.setScalar(0.2);
      // Tilt slightly for a better clinical view angle
      group.rotation.x = -0.15;
      group.add(gltf.scene);
      scene.add(group);
      currentGroup = group;

      // Collect all meshes
      gltf.scene.traverse(obj => {
        if (obj instanceof THREE.Mesh) allMeshes.push(obj);
      });

      // Run resolver
      const map = resolveScene(gltf.scene);
      const resolved = Object.keys(map).length;

      document.getElementById('stat-meshes').textContent = allMeshes.length;
      document.getElementById('stat-resolved').textContent = resolved;

      loading.classList.add('hidden');
      document.getElementById('status-text').textContent = `${resolved} teeth resolved — ready`;
      document.getElementById('status-dot').style.background = 'var(--pass)';
      document.getElementById('status-dot').style.animation = 'pulse 2s infinite';
    },
    (xhr) => {
      if (xhr.total) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        loadPct.textContent = pct + '%';
      }
    },
    (err) => {
      loadMsg.textContent = 'Error loading model';
      loadPct.textContent = '✕';
      console.error(err);
      document.getElementById('status-text').textContent = 'Load failed — check console';
      document.getElementById('status-dot').style.background = 'var(--fail)';
    }
  );
}

window.switchModel = function(key) {
  document.getElementById('btn-stained').classList.toggle('active', key === 'stained');
  document.getElementById('btn-nostain').classList.toggle('active', key === 'nostain');
  loadModel(key);
};

// ── Render loop ───────────────────────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

// ── Init ──────────────────────────────────────────────────────────────────
buildMappingList(MAPPING_ENTRIES);
loadModel('stained');

</script>
</body>
</html>
