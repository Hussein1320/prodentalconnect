<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProDentalConnect — Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #071428;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F8FAFC;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #3B82F6, #38BDF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .tooth { font-size: 48px; margin-bottom: 20px; }
    .tagline { font-size: 15px; color: #94A3B8; margin-bottom: 48px; text-align: center; }
    .card {
      background: #132238;
      border: 1.5px solid rgba(80,140,255,0.18);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .card p { font-size: 13px; color: #94A3B8; margin-bottom: 28px; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: rgba(59,130,246,0.12);
      color: #60A5FA;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0F1C34;
      border: 1.5px solid rgba(80,140,255,0.28);
      border-radius: 12px;
      color: #F8FAFC;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 3px;
    }
    input[type="password"]:focus { border-color: #3B82F6; }
    input[type="password"]::placeholder { letter-spacing: 0; color: #64748B; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #006DFF, #0057CC);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      box-shadow: 0 0 20px rgba(0,109,255,0.3);
    }
    button:hover { opacity: 0.9; }
    .error { color: #EF4444; font-size: 12px; margin-top: 10px; display: none; }
    .footer { margin-top: 40px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>

  <div class="tooth">🦷</div>
  <div class="logo">ProDentalConnect</div>
  <div class="tagline">The smart platform for modern dental practices</div>

  <div class="card">
    <div class="badge">🚀 Coming Soon</div>
    <h2>We're almost ready!</h2>
    <p>Our platform is currently being set up.<br/>Enter the access password to preview the site.</p>
    <input type="password" id="pwd" placeholder="Enter access password" onkeydown="if(event.key==='Enter')check()"/>
    <button onclick="check()">Access Site →</button>
    <div class="error" id="err">❌ Incorrect password. Please try again.</div>
  </div>

  <div class="footer">© 2026 ProDentalConnect. All rights reserved.</div>

  <script>
    const PASSWORD = "dental2026";

    // Check if already unlocked this session
    if(sessionStorage.getItem('pdc_unlocked') === 'true'){
      showApp();
    }

    function check() {
      const val = document.getElementById('pwd').value;
      if(val === PASSWORD){
        sessionStorage.setItem('pdc_unlocked', 'true');
        showApp();
      } else {
        document.getElementById('err').style.display = 'block';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }

    function showApp(){
      sessionStorage.setItem('pdc_unlocked', 'true');
      window.location.href = '/app';
    }
  </script>

</body>
</html>
